AWSTemplateFormatVersion: '2010-09-09'
Description: >
  App stack - ECS cluster, task definition, service, autoscaling,
  CodePipeline/CodeDeploy blue/green pipeline triggered by ECR image pushes.
  Depends on network stack exports.

# Parameters:
#   EnvironmentName:
#     Type: String
#     Default: ecs-fargate-demo
#     Description: Must match the EnvironmentName used in the network stack

#   ECRImageUri:
#     Type: String
#     Description: Full ECR image URI including tag for the initial task definition

#   ContainerPort:
#     Type: Number
#     Default: 8080

#   TaskCpu:
#     Type: String
#     Default: '256'

#   TaskMemory:
#     Type: String
#     Default: '512'

#   ECRRepositoryName:
#     Type: String
#     Description: Name of the ECR repository to watch for image pushes

#   ConfigObjectKey:
#     Type: String
#     Default: config.zip
#     Description: S3 object key of the zip holding taskdef.json + appspec.yaml

#   ImagesEnvironmentPrefix:
#     Type: String
#     Default: photo-gallery
#     Description: Must match the EnvironmentPrefix used in the s3-cdn stack

